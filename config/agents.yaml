agents:
  - id: telemetry-agent
    role: telemetry
    can_vote: true
    can_propose: true
    scope:
      - metrics
      - traces
      - logs
    # api_key_hash: <argon2id hash — set with: python -m apps.api.app.tools.bootstrap_keys generate --agent-id telemetry-agent>
    api_key_hash: ""

  - id: deploy-agent
    role: deployment
    can_vote: true
    can_propose: true
    scope:
      - deployments
      - release-history
      - rollout-analysis
    # api_key_hash: <argon2id hash — set with: python -m apps.api.app.tools.bootstrap_keys generate --agent-id deploy-agent>
    api_key_hash: ""

  - id: code-agent
    role: code
    can_vote: true
    can_propose: true
    scope:
      - repo-diffs
      - config
      - tests
    # api_key_hash: <argon2id hash — set with: python -m apps.api.app.tools.bootstrap_keys generate --agent-id code-agent>
    api_key_hash: ""

  - id: operator
    role: human
    can_vote: true
    can_propose: false
    scope:
      - approval
      - override
    # api_key_hash: <argon2id hash — set with: python -m apps.api.app.tools.bootstrap_keys generate --agent-id operator>
    api_key_hash: ""

  # LLM-backed agent. Driven by apps/llm_agent (Phase 4 LLM adapter PR 1+).
  # Add an `llm:` sub-block to any agent you want to drive with Claude.
  # The adapter runs as its own OS process and talks to the Quorum API
  # over HTTP under this agent's credentials — same auth path as any
  # other caller.
  - id: telemetry-llm-agent
    role: telemetry
    can_vote: false        # v1: proposer only, voting is deferred
    can_propose: true
    scope:
      - metrics
      - traces
      - logs
    # api_key_hash: <argon2id hash — set with: python -m apps.api.app.tools.bootstrap_keys generate --agent-id telemetry-llm-agent>
    api_key_hash: ""
    # Per-agent action_type allow-list (Phase 4 LLM PR 3). The server
    # enforces this in POST /api/v1/proposals — a mismatched action_type
    # returns 403 before the proposal hits the event log. LLM-emitted
    # proposals stay restricted to low-risk actions; open_pr / close_pr
    # remain operator-only in v1.
    allowed_action_types:
      - github.add_labels
      - github.comment_issue
    llm:
      provider: anthropic
      # Opus 4.7 is the default per apps/.claude/ project conventions.
      # Operators tuning for cost can switch to claude-sonnet-4-6.
      model: claude-opus-4-7
      system_prompt_ref: prompts/telemetry-agent.md
      daily_token_cap: 2000000        # ~$10/day worst case on Opus 4.7
      per_tick_token_cap: 50000       # single tick cap
      poll_interval_seconds: 30.0     # adapter tick cadence
      max_events_per_tick: 100        # per-tick event window
