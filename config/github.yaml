# Configuration for the GitHub App actuator (Phase 4).
#
# This file is committed and MUST NOT contain secrets.
# Placeholder values below must be filled in out-of-band per deploy:
#
#   1. Register a GitHub App and install it on the target repo(s).
#   2. Set `app.app_id` to the numeric App ID from the App settings page.
#   3. For each install, record `owner`, `repo`, and the numeric
#      `installation_id` from the install URL.
#   4. Provide the App private key via env:
#        QUORUM_GITHUB_APP_PRIVATE_KEY        (PEM string), or
#        QUORUM_GITHUB_APP_PRIVATE_KEY_B64    (base64 PEM string), or
#        QUORUM_GITHUB_APP_PRIVATE_KEY_PATH   (path to PEM on disk)
#
# Loaded by apps.api.app.services.actuators.github.specs.load_github_config
# during app startup. The private key still comes from the environment;
# without it, app startup logs github_actuator_disabled and continues.

app:
  app_id: 3496381
  installations:
    - owner: jaydenpiao
      repo: quorum-actuator-fixtures
      installation_id: 126887427

limits:
  max_files_per_pr: 200
  max_file_bytes: 65536
  poll_interval_seconds: 5
