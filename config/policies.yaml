protected_environments:
  - prod

denied_action_types:
  - delete-database
  - destroy-cluster

risk_rules:
  low:
    votes_required: 2
    requires_human: false
  medium:
    votes_required: 2
    requires_human: false
  high:
    votes_required: 2
    requires_human: true
  critical:
    votes_required: 3
    requires_human: true

environment_overrides:
  prod:
    minimum_votes_required: 2
    force_human_approval: true

# Per-action_type overrides. These *tighten* risk-level rules (MAX of
# votes_required, OR of requires_human) — they never loosen them. An
# unknown action_type falls back to the risk-level rule above.
action_type_rules:
  github.open_pr:
    votes_required: 2
    requires_human: false
  github.close_pr:
    votes_required: 2
    requires_human: false
  github.comment_issue:
    votes_required: 1
    requires_human: false
  github.add_labels:
    votes_required: 1
    requires_human: false
  # fly.deploy redeploys production. Strictest action rule we have:
  # two votes plus explicit human approval via the Phase 4 approval
  # entity. See docs/design/fly-deployment.md §Dog-food deploy flow.
  fly.deploy:
    votes_required: 2
    requires_human: true

rollback:
  auto_on_failed_health_checks: true
