# gitleaks configuration — https://github.com/gitleaks/gitleaks
#
# Extends the built-in ruleset with a tight regex allowlist for known-safe
# test fixtures and local demo placeholders. Never add real secrets here.
# Rotate leaked secrets; do not allowlist them.

[extend]
useDefault = true

[allowlist]
description = "Known-safe test fixtures and local demo placeholders"
regexes = [
    '''correct-horse-battery-staple-test-key-32b''',
    '''fake-test-plaintext''',
    '''operator-key-dev''',
]
paths = [
    '''tests/test_auth_argon2\.py$''',
]
