services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: quorum:local
    ports:
      - "8080:8080"
    env_file:
      # Copy .env.example to .env and fill in your values.
      # This file is NOT committed — it holds local dev secrets.
      - .env
    volumes:
      # Persist the append-only event log across container restarts.
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
