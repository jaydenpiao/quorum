name: image-push

# Builds the Quorum control-plane container image on every merge to `main`
# and pushes it to both Fly app registries tagged with the commit SHA
# (content-addressed — the `fly.deploy` actuator consumes the digest).
#
# The job is gated on `FLY_API_TOKEN` being configured as a repository
# secret. When it is absent (e.g. in a fork, or before the operator has
# provisioned a Fly app) the job short-circuits with a status message
# instead of failing, so Phase 5 can land without Fly account setup.
#
# Trigger surface:
#   - push to main (automatic; gated on secret)
#     Docs-only pushes are ignored so handoff/README/changelog refreshes
#     don't create deploy-agent image evidence for non-runtime changes.
#   - workflow_dispatch (manual; useful for back-filling a digest from an
#     older commit)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: image-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push:
    name: build and push to fly registry
    runs-on: ubuntu-latest
    # Job runs only when the secret is present. We check the secret via
    # an env expression because `if: secrets.X` does not expand inside
    # job-level conditions — push through env.
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      QUORUM_IMAGE_PUSH_API_URL: ${{ secrets.QUORUM_IMAGE_PUSH_API_URL }}
      QUORUM_IMAGE_PUSH_API_KEY: ${{ secrets.QUORUM_IMAGE_PUSH_API_KEY }}
    steps:
      - name: Check for Fly API token
        id: gate
        run: |
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FLY_API_TOKEN not set — skipping image push. Set the repo secret to enable."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.has_token == 'true'

      - name: Install flyctl
        if: steps.gate.outputs.has_token == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Authenticate docker to registry.fly.io
        if: steps.gate.outputs.has_token == 'true'
        run: flyctl auth docker

      - name: Set up Docker Buildx
        if: steps.gate.outputs.has_token == 'true'
        uses: docker/setup-buildx-action@v4

      # Content-addressed tags: the commit SHA under each Fly app's
      # registry namespace. The `fly.deploy` actuator deploys
      # `registry.fly.io/<app>@sha256:...`, so staging and prod both need
      # app-scoped tags even when they point at the same image manifest.
      - name: Build and push image
        if: steps.gate.outputs.has_token == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            registry.fly.io/quorum-staging:${{ github.sha }}
            registry.fly.io/quorum-prod:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record image digests in job summary
        if: steps.gate.outputs.has_token == 'true'
        run: |
          STAGING_DIGEST=$(docker buildx imagetools inspect \
            registry.fly.io/quorum-staging:${{ github.sha }} \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          PROD_DIGEST=$(docker buildx imagetools inspect \
            registry.fly.io/quorum-prod:${{ github.sha }} \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "### image-push" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- staging tag:    \`registry.fly.io/quorum-staging:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- staging digest: \`${STAGING_DIGEST}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- prod tag:       \`registry.fly.io/quorum-prod:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- prod digest:    \`${PROD_DIGEST}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "STAGING_DIGEST=${STAGING_DIGEST}" >> "$GITHUB_ENV"
          echo "PROD_DIGEST=${PROD_DIGEST}" >> "$GITHUB_ENV"

      - name: Notify Quorum image-push evidence
        if: steps.gate.outputs.has_token == 'true' && env.QUORUM_IMAGE_PUSH_API_URL != '' && env.QUORUM_IMAGE_PUSH_API_KEY != ''
        env:
          COMMIT_SHA: ${{ github.sha }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          MAX_ATTEMPTS = 5


          def append_summary(lines):
              summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
              if not summary_path:
                  return
              with open(summary_path, "a", encoding="utf-8") as summary:
                  for line in lines:
                      summary.write(f"{line}\n")


          def build_request():
              return urllib.request.Request(
                  f"{base_url}/api/v1/image-pushes",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Accept": "application/json",
                      "Authorization": f"Bearer {os.environ['QUORUM_IMAGE_PUSH_API_KEY']}",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )


          def find_event_id(record_id):
              if record_id == "unknown":
                  return "unknown"
              try:
                  with urllib.request.urlopen(f"{base_url}/api/v1/events", timeout=30) as response:
                      events = json.loads(response.read().decode("utf-8"))
              except (json.JSONDecodeError, urllib.error.URLError, TimeoutError, OSError):
                  return "lookup failed"

              for event in reversed(events):
                  if (
                      event.get("event_type") == "image_push_completed"
                      and event.get("payload", {}).get("id") == record_id
                  ):
                      return event.get("id", "unknown")
              return "not found"


          base_url = os.environ["QUORUM_IMAGE_PUSH_API_URL"].rstrip("/")
          payload = {
              "commit_sha": os.environ["COMMIT_SHA"],
              "workflow_run_id": os.environ["WORKFLOW_RUN_ID"],
              "workflow_url": os.environ["WORKFLOW_URL"],
              "staging_image_ref": f"registry.fly.io/quorum-staging@{os.environ['STAGING_DIGEST']}",
              "staging_digest": os.environ["STAGING_DIGEST"],
              "prod_image_ref": f"registry.fly.io/quorum-prod@{os.environ['PROD_DIGEST']}",
              "prod_digest": os.environ["PROD_DIGEST"],
          }

          for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                  with urllib.request.urlopen(build_request(), timeout=30) as response:
                      response_body = response.read().decode("utf-8")
              except (urllib.error.URLError, TimeoutError, OSError) as exc:
                  if attempt < MAX_ATTEMPTS:
                      backoff_seconds = min(2 ** (attempt - 1), 20)
                      print(
                          "::warning::image_push_completed evidence post failed "
                          f"(attempt {attempt}/{MAX_ATTEMPTS}); retrying in "
                          f"{backoff_seconds}s: {type(exc).__name__}"
                      )
                      time.sleep(backoff_seconds)
                      continue

                  print(
                      "::warning::image_push_completed evidence post failed after "
                      f"{MAX_ATTEMPTS} attempts (non-blocking): {type(exc).__name__}"
                  )
                  append_summary(
                      [
                          "### Quorum image-push evidence",
                          "",
                          "- quorum evidence status: `failed-non-blocking`",
                          f"- quorum evidence error: `{type(exc).__name__}`",
                      ]
                  )
                  sys.exit(0)

              record = json.loads(response_body) if response_body else {}
              record_id = record.get("id", "unknown")
              event_id = record.get("event_id") or find_event_id(record_id)
              created_at = record.get("created_at", "unknown")
              append_summary(
                  [
                      "### Quorum image-push evidence",
                      "",
                      "- quorum evidence status: `posted`",
                      f"- quorum image-push id: `{record_id}`",
                      f"- quorum evidence event id: `{event_id}`",
                      f"- quorum evidence created_at: `{created_at}`",
                  ]
              )
              print("image_push_completed evidence posted to Quorum")
              sys.exit(0)
          PY
