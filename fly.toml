# Shared Fly.io app config for Quorum.
#
# One file; `app` is supplied at deploy time via `--app quorum-staging`
# or `--app quorum-prod`. We deliberately do NOT hard-code `app =` here
# so the wrong target is impossible to pick up accidentally.
#
# Per docs/design/fly-deployment.md: one machine per app (single-writer
# EventLog + per-machine volume), region pinned, two http_checks
# (liveness on /api/v1/health, readiness on /readiness). Prod opts out
# of scale-to-zero via `fly machine update <machine-id> --app
# quorum-prod --autostop=off --autostart --yes` because the operator
# console holds long-lived SSE connections.
#
# Secrets (QUORUM_API_KEYS, QUORUM_GITHUB_APP_PRIVATE_KEY, DATABASE_URL)
# are set via `fly secrets set ... --app <app>`, never here.

primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  QUORUM_LOG_LEVEL = "INFO"
  OTEL_SERVICE_NAME = "quorum"

# Canonical event log lives on a per-app Fly Volume. Create it out-of-band:
#   fly volumes create quorum_data --size 1 --region iad --app <app>
# Volumes are region-local and per-machine — the "one machine per app"
# constraint in the design doc is enforced by not scaling past 1.
[mounts]
  source = "quorum_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Default is scale-to-zero (staging behavior). For prod:
  #   fly machine update <machine-id> --app quorum-prod \
  #     --autostop=off --autostart --yes
  # This keeps the machine warm for SSE connections from the operator
  # console. Use `--autostop=off`; `flyctl` parses `--autostop off` as
  # an extra positional argument.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # Liveness: trivial "ok" probe. Matches Dockerfile HEALTHCHECK path.
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/api/v1/health"

  # Readiness: gates traffic until the event log hash chain has verified
  # and the Postgres projection (if configured) is reachable. Longer
  # grace_period covers chain verification on restored volumes.
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "get"
    path = "/readiness"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
